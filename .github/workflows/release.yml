name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      sign: true

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
          fetch-depth: 0
    - name: Generate Changelog
      uses: orhun/git-cliff-action@v4
      with:
        args: -vv --latest --strip all
    - name: Download APK
      uses: actions/download-artifact@v8
      with:
        name: app-release.apk
    - name: Create BodyFile
      run: |
        VERSION_CODE=$(cat app/build.gradle.kts | grep versionCode | awk '{print $3}')
        echo "# General [Changelog](metadata/en-US/changelogs/$VERSION_CODE.txt)" > bodyFile
        cat "metadata/en-US/changelogs/$VERSION_CODE.txt" >> bodyFile
        echo "---\n# Full [Changelog](docs/CHANGELOG.md)" >> bodyFile
        cat "git-cliff/CHANGELOG.md" >> bodyFile
    - name: Upload Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: app-release.apk
        bodyFile: bodyFile
